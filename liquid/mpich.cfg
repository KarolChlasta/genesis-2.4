# Example Hydra/MPICH machinefile for the PGENESIS LSM.
# Prepared by Karol Chlasta (karol@chlasta.pl), 2026-07-15.
#
# NOT used by start.sh unless you opt in with  HOSTFILE=mpich.cfg .
# On a SLURM cluster (UMCS inf02/inf03) you normally do NOT need this: request
# the ranks with  #SBATCH --ntasks=<pdim^2+1>  and let SLURM+PMI place them.
#
# Use this file only for a non-scheduler, bare-ssh MPICH run. Total slots must
# sum to at least NP = pdim^2 + 1 (e.g. pdim=8 -> 65 ranks). Format is
# "<host>:<slots>". Replace the placeholder hosts below with real node names.
#
# host01:32
# host02:33
